<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <div class="chat-container"> <link rel="stylesheet" href="chatbot/styrl.css">
    <script src="chatbot/script.js"></script>       
    <link rel="ai" href="chatbot/chatbot.py"></div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <strong>AI Assistant</strong>
                <button id="closeBtn" class="close-btn">X</button>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="bot-msg">Hi! Type or speak to me.</div>
            </div>
            <div class="chat-footer">
                <button id="micBtn" class="mic-btn">🎤</button>
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>
        <div class="chat-launcher" id="chatLauncher">💬</div>
    </div>  
 
</body>
</html>
